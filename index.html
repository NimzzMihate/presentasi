<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentasi Statistika: Analisis Berat Badan</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            color: #0F172A;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            scroll-behavior: smooth;
            margin: 0;
            padding: 0;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F1F5F9;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
        .reveal-up {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: opacity, transform;
        }
        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-left {
            opacity: 0;
            transform: translateX(-50px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal-left.active {
            opacity: 1;
            transform: translateX(0);
        }
        .reveal-scale {
            opacity: 0;
            transform: scale(0.85);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal-scale.active {
            opacity: 1;
            transform: scale(1);
        }
        .reveal-pop {
            opacity: 0;
            transform: scale(0.5) translateY(20px);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .reveal-pop.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .delay-100 {
            transition-delay: 100ms;
        }
        .delay-200 {
            transition-delay: 200ms;
        }
        .delay-300 {
            transition-delay: 300ms;
        }
        .delay-400 {
            transition-delay: 400ms;
        }
        .delay-500 {
            transition-delay: 500ms;
        }
        .delay-600 {
            transition-delay: 600ms;
        }
        @keyframes float-ambient {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }
            50% {
                transform: translateY(-25px) rotate(3deg) scale(1.05);
            }
        }
        .animate-float-ambient {
            animation: float-ambient 12s ease-in-out infinite;
        }
        .sound-wave {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 18px;
        }
        .sound-wave span {
            width: 3px;
            height: 100%;
            background-color: currentColor;
            border-radius: 3px;
            animation: wave-bounce 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sound-wave span:nth-child(1) {
            animation-delay: 0.0s;
        }
        .sound-wave span:nth-child(2) {
            animation-delay: 0.15s;
        }
        .sound-wave span:nth-child(3) {
            animation-delay: 0.3s;
        }
        .sound-wave span:nth-child(4) {
            animation-delay: 0.45s;
        }
        @keyframes wave-bounce {
            0%,
            100% {
                transform: scaleY(0.2);
            }
            50% {
                transform: scaleY(1);
            }
        }
        .premium-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .premium-shadow:hover {
            box-shadow: 0 25px 35px -5px rgba(0, 0, 0, 0.1), 0 15px 15px -5px rgba(0, 0, 0, 0.04);
            transform: translateY(-8px) scale(1.01);
        }
        .concept-box {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-left: 6px solid #4F46E5;
            position: relative;
            overflow: hidden;
            transition: transform 0.4s ease;
        }
        .concept-box:hover {
            transform: translateX(8px);
        }
        .concept-box::after {
            content: '\f02d';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: -20px;
            bottom: -30px;
            font-size: 8rem;
            color: rgba(79, 70, 229, 0.03);
            transform: rotate(-15deg);
            pointer-events: none;
        }
        .chart-tooltip {
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
            transform: translateY(15px) scale(0.95);
        }
        .chart-interactive:hover .chart-tooltip {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .pie-slice {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center;
        }
        .pie-slice:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.2));
            z-index: 10;
        }
        .svg-bar {
            transform-origin: bottom;
            animation: growUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transition: all 0.4s ease;
        }
        .svg-bar:hover {
            opacity: 0.85;
            filter: brightness(1.15);
        }
        @keyframes growUp {
            from {
                transform: scaleY(0);
            }
            to {
                transform: scaleY(1);
            }
        }
        .svg-line-path {
            stroke-dasharray: 4000;
            stroke-dashoffset: 4000;
            animation: drawLine 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .svg-area-path {
            opacity: 0;
            animation: fadeIn 1.5s 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .svg-point {
            opacity: 0;
            transform-origin: center;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.3);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const TIM_PROYEK = [{
            id: 1,
            nama: "Na'im",
            peran: "Web Development",
            hasImage: true,
            image: "https://i.theoks.net/wPavlA.jpg",
            icon: null,
            theme: "indigo"
        }, {
            id: 2,
            nama: "Farhan",
            peran: "Pengerjaan Matematika",
            hasImage: true,
            image: "https://i.theoks.net/2ZeP69.jpg",
            icon: null,
            theme: "sky"
        }, {
            id: 3,
            nama: "Rofikul",
            peran: "Member Tim",
            hasImage: false,
            image: null,
            icon: "fa-user-check",
            theme: "emerald"
        }];
        const RAW_DATA = [49, 90, 75, 45, 68, 70, 54, 41, 78, 78, 57, 55, 59, 52, 53, 40, 59, 51, 39, 83, 43,
            45, 48, 47, 54, 50, 40, 70
        ];
        const SORTED_DATA = [...RAW_DATA].sort((a, b) => a - b);
        const TABEL_DISTRIBUSI = [{
            id: 1,
            label: '39',
            batasBawah: 38.5,
            batasAtas: 39.5,
            freq: 1,
            percent: 3.57
        }, {
            id: 2,
            label: '40 - 49',
            batasBawah: 39.5,
            batasAtas: 49.5,
            freq: 9,
            percent: 32.14
        }, {
            id: 3,
            label: '50 - 59',
            batasBawah: 49.5,
            batasAtas: 59.5,
            freq: 10,
            percent: 35.71
        }, {
            id: 4,
            label: '68',
            batasBawah: 67.5,
            batasAtas: 68.5,
            freq: 1,
            percent: 3.57
        }, {
            id: 5,
            label: '70 - 78',
            batasBawah: 69.5,
            batasAtas: 78.5,
            freq: 5,
            percent: 17.86
        }, {
            id: 6,
            label: '83',
            batasBawah: 82.5,
            batasAtas: 83.5,
            freq: 1,
            percent: 3.57
        }, {
            id: 7,
            label: '90',
            batasBawah: 89.5,
            batasAtas: 90.5,
            freq: 1,
            percent: 3.57
        }];
        const STATISTIK = { n: 28, sum: 1593, mean: 56.9, median: 53.5, modus: '50 - 59', maxFreq: 10 };
        const CHART_COLORS = ['#6366f1', '#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#f43f5e'];

        const usePresenter = () => {
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [activeScriptId, setActiveScriptId] = useState(null);
            const utteranceRef = useRef(null);

            useEffect(() => {
                return () => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                    }
                };
            }, []);

            const speak = (text, scriptId) => {
                if (!('speechSynthesis' in window)) {
                    alert('Browser Anda tidak mendukung fitur Text-to-Speech');
                    return;
                }

                if (activeScriptId === scriptId) {
                    window.speechSynthesis.cancel();
                    setIsSpeaking(false);
                    setActiveScriptId(null);
                    return;
                }

                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID';
                utterance.rate = 0.95;
                utterance.pitch = 1;

                utterance.onstart = () => {
                    setIsSpeaking(true);
                    setActiveScriptId(scriptId);
                };

                utterance.onend = () => {
                    setIsSpeaking(false);
                    setActiveScriptId(null);
                };

                utterance.onerror = (event) => {
                    console.error('Speech error:', event);
                    setIsSpeaking(false);
                    setActiveScriptId(null);
                };

                window.speechSynthesis.speak(utterance);
            };

            return { speak, isSpeaking, activeScriptId };
        };

        const AIContext = React.createContext();

        function useInView(options = { threshold: 0.15 }) {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsVisible(true);
                        observer.unobserve(entry.target); }
                }, options);
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, [options]);
            return [ref, isVisible];
        }

        function useCountUp(endValue, duration = 2500, isVisible = true) {
            const [count, setCount] = useState(0);
            useEffect(() => {
                if (!isVisible) return;
                let startTime = null;
                let animationFrame;
                const animate = (timestamp) => {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 5);
                    setCount(endValue * easeProgress);
                    if (progress < 1) animationFrame = window.requestAnimationFrame(animate);
                    else setCount(endValue);
                };
                animationFrame = window.requestAnimationFrame(animate);
                return () => window.cancelAnimationFrame(animationFrame);
            }, [endValue, duration, isVisible]);
            return count;
        }

        const Section = ({ id, children, bgColor = "bg-transparent", className = "" }) => ( <
            section id = { id } className = { `py-24 md:py-36 px-6 md:px-12 w-full overflow-hidden ${bgColor} ${className}` } >
            <
            div className = "max-w-6xl mx-auto w-full" > { children } < /div> <
            /section>
        );

        const AITalkButton = ({ textScript, scriptId }) => {
            const { speak, isSpeaking, activeScriptId } = React.useContext(AIContext);
            const isActive = isSpeaking && activeScriptId === scriptId;
            return ( <
                button onClick = {
                    () => speak(textScript, scriptId)
                }
                className = { `mt-6 px-6 py-3 rounded-full font-bold text-sm transition-all duration-500 flex items-center gap-3 border shadow-md hover:scale-105 ${
                        isActive ? 'bg-indigo-600 text-white border-indigo-700 ring-4 ring-indigo-200' :
                        'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50 hover:shadow-lg'
                    }` } > {
                    isActive ? ( <
                        > < div className = "sound-wave text-white" > < span > < /span><span></span > < span > < /span><span></span > < /div> AI Menjelaskan...</ >
                    ) : ( <
                        > < i className = "fa-solid fa-microphone-lines text-lg" > < /i> Dengarkan Penjelasan</ >
                    )
                } <
                /button>
            );
        };

        const SectionTitle = ({ title, subtitle, icon, scriptId, scriptText }) => {
            const [ref, isVisible] = useInView();
            return ( <
                div ref = { ref } className = { `mb-16 flex flex-col md:flex-row items-center md:items-start gap-8 text-center md:text-left reveal-left ${isVisible ? 'active' : ''}` } >
                <
                div className = "w-20 h-20 bg-white border border-slate-200 rounded-3xl flex items-center justify-center premium-shadow shrink-0" >
                <
                i className = { `fa-solid ${icon} text-4xl text-indigo-600` } > < /i> <
                /div> <
                div >
                <
                h2 className = "text-4xl md:text-5xl font-extrabold text-slate-800 mb-4" > { title } < /h2> <
                p className = "text-xl text-slate-500 max-w-3xl leading-relaxed" > { subtitle } < /p> {
                    scriptText && < AITalkButton textScript = { scriptText }
                    scriptId = { scriptId }
                    />} <
                    /div> <
                    /div>
                );
            };

            const ConceptExplanation = ({ title, explanation, icon }) => ( <
                div className = "concept-box p-8 md:p-10 rounded-[2rem] mb-16 premium-shadow reveal-up active shadow-md border border-slate-100" >
                <
                div className = "flex flex-col md:flex-row gap-8 items-start" >
                <
                div className = "w-16 h-16 shrink-0 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-3xl border border-indigo-100" >
                <
                i className = { `fa-solid ${icon}` } > < /i> <
                /div> <
                div >
                <
                h4 className = "text-2xl font-extrabold text-slate-800 mb-3" > Penjelasan: { title } < /h4> <
                p className = "text-slate-600 leading-relaxed text-lg" > { explanation } < /p> <
                /div> <
                /div> <
                /div>
            );

            const SvgPieChart = ({ data }) => {
                const [ref, isVisible] = useInView();
                const [hoveredIndex, setHoveredIndex] = useState(null);
                const size = 440;
                const center = size / 2;
                const outerRadius = 180;
                const innerRadius = 100;
                let currentAngle = -Math.PI / 2;
                const total = data.reduce((sum, d) => sum + d.freq, 0);
                const slices = data.map((item, i) => {
                    const sliceAngle = (item.freq / total) * 2 * Math.PI;
                    const endAngle = currentAngle + sliceAngle;
                    const x1 = center + outerRadius * Math.cos(currentAngle);
                    const y1 = center + outerRadius * Math.sin(currentAngle);
                    const x2 = center + outerRadius * Math.cos(endAngle);
                    const y2 = center + outerRadius * Math.sin(endAngle);
                    const x3 = center + innerRadius * Math.cos(endAngle);
                    const y3 = center + innerRadius * Math.sin(endAngle);
                    const x4 = center + innerRadius * Math.cos(currentAngle);
                    const y4 = center + innerRadius * Math.sin(currentAngle);
                    const largeArcFlag = sliceAngle > Math.PI ? 1 : 0;
                    const pathData = [`M ${x1} ${y1}`,
                        `A ${outerRadius} ${outerRadius} 0 ${largeArcFlag} 1 ${x2} ${y2}`, `L ${x3} ${y3}`,
                        `A ${innerRadius} ${innerRadius} 0 ${largeArcFlag} 0 ${x4} ${y4}`, 'Z'
                    ].join(' ');
                    const midAngle = currentAngle + (sliceAngle / 2);
                    const labelRadius = innerRadius + (outerRadius - innerRadius) / 2;
                    const labelX = center + labelRadius * Math.cos(midAngle);
                    const labelY = center + labelRadius * Math.sin(midAngle);
                    currentAngle = endAngle;
                    return { pathData, color: CHART_COLORS[i % CHART_COLORS.length], item, labelX, labelY };
                });
                return ( <
                    div ref = { ref } className = "w-full flex flex-col md:flex-row items-center justify-center gap-16 p-10 bg-white rounded-[2.5rem] border border-slate-100 premium-shadow" >
                    <
                    div className = { `relative w-80 h-80 md:w-[28rem] md:h-[28rem] reveal-scale ${isVisible ? 'active' : ''}` } >
                    <
                    svg viewBox = { `0 0 ${size} ${size}` } className = "w-full h-full overflow-visible drop-shadow-2xl" > {
                        slices.map((slice, i) => ( <
                            g key = { i } className = "pie-slice cursor-pointer"
                            onMouseEnter = { () => setHoveredIndex(i) }
                            onMouseLeave = { () => setHoveredIndex(null) } style = {
                                { transformOrigin: `${center}px ${center}px` } } >
                            <
                            path d = { slice.pathData } fill = { slice.color } stroke = "#ffffff"
                            strokeWidth = "4" strokeLinejoin = "round" / > {
                                slice.item.percent > 5 && < text x = { slice.labelX } y = { slice.labelY } textAnchor = "middle"
                                alignmentBaseline = "middle" fill = "#ffffff" fontSize = "18" fontWeight = "bold"
                                className = "pointer-events-none drop-shadow-lg" > { slice.item.percent } % < /text>} <
                                /g>
                            ))
                        } <
                        text x = { center } y = { center - 12 } textAnchor = "middle" fill = "#64748b" fontSize = "18"
                        fontWeight = "bold" > Total Data < /text> <
                        text x = { center } y = { center + 25 } textAnchor = "middle" fill = "#0f172a" fontSize = "36"
                        fontWeight = "900" fontFamily = "monospace" > { STATISTIK.n } < /text> <
                        /svg> <
                        /div> <
                        div className = "flex flex-col gap-4 w-full md:w-auto" > {
                            data.map((item, index) => ( <
                                div key = { index } className = { `flex items-center justify-between gap-10 p-4 rounded-2xl border-2 transition-all duration-500 reveal-left ${isVisible ? 'active' : ''}` }
                                style = {
                                    {
                                        transitionDelay: `${index * 120}ms`,
                                        borderColor: hoveredIndex === index ? CHART_COLORS[index] :
                                            'transparent',
                                        backgroundColor: hoveredIndex === index ?
                                            `${CHART_COLORS[index]}15` : 'transparent',
                                        transform: hoveredIndex === index ? 'scale(1.05)' : 'scale(1)'
                                    } }
                                onMouseEnter = { () => setHoveredIndex(index) }
                                onMouseLeave = { () => setHoveredIndex(null) } >
                                <
                                div className = "flex items-center gap-5" >
                                <
                                div className = "w-6 h-6 rounded-lg shadow-md" style = {
                                    { backgroundColor: CHART_COLORS[index % CHART_COLORS.length] } } > < /div> <
                                span className = "font-extrabold text-slate-800 text-xl" > { item.label } kg < /span> <
                                /div> <
                                div className = "text-right" >
                                <
                                div className = "font-mono font-bold text-indigo-600 text-xl" > { item.percent } % < /div> <
                                div className = "text-sm font-semibold text-slate-400" > f = { item.freq } < /div> <
                                /div> <
                                /div>
                            ))
                        } <
                        /div> <
                        /div>
                    );
                };

                const SvgBarChart = ({ data }) => {
                    const [ref, isVisible] = useInView();
                    const svgWidth = 900;
                    const svgHeight = 450;
                    const padding = { top: 50, right: 30, bottom: 70, left: 60 };
                    const chartW = svgWidth - padding.left - padding.right;
                    const chartH = svgHeight - padding.top - padding.bottom;
                    const maxVal = STATISTIK.maxFreq;
                    const barWidth = chartW / data.length * 0.55;
                    const stepX = chartW / data.length;
                    return ( <
                        div ref = { ref } className = "w-full bg-white p-8 rounded-[2.5rem] border border-slate-100 premium-shadow overflow-x-auto" >
                        <
                        svg viewBox = { `0 0 ${svgWidth} ${svgHeight}` } className = "w-full h-auto min-w-[700px]" > {
                            [0, 2, 4, 6, 8, 10].map(tick => {
                                const y = padding.top + chartH - ((tick / maxVal) * chartH);
                                return ( <
                                    g key = { tick } >
                                    <
                                    line x1 = { padding.left - 15 } y1 = { y } x2 = { svgWidth - padding.right } y2 = { y } stroke = "#f1f5f9"
                                    strokeWidth = "2" / >
                                    <
                                    text x = { padding.left - 25 } y = { y + 6 } textAnchor = "end" fill = "#94a3b8" fontSize = "16"
                                    fontFamily = "monospace" fontWeight = "bold" > { tick } < /text> <
                                    /g>
                                );
                            })
                        } {
                            data.map((d, i) => {
                                const barH = (d.freq / maxVal) * chartH;
                                const x = padding.left + (i * stepX) + (stepX - barWidth) / 2;
                                const y = padding.top + chartH - barH;
                                return ( <
                                    g key = { i } className = "chart-interactive" >
                                    <
                                    rect x = { x - 15 } y = { padding.top } width = { barWidth + 30 } height = { chartH } fill =
                                    "transparent" / >
                                    <
                                    rect x = { x } y = { y } width = { barWidth } height = { barH } rx = "8" ry = "8" fill = { CHART_COLORS[
                                            0] } className = { isVisible ? 'svg-bar' : '' } style = {
                                        { animationDelay: `${i * 120}ms` } }
                                    /> <
                                    g className = "chart-tooltip" >
                                    <
                                    rect x = { x + barWidth / 2 - 25 } y = { y - 45 } width = "50" height = "30" rx = "6" fill =
                                    "#0f172a" / >
                                    <
                                    text x = { x + barWidth / 2 } y = { y - 24 } textAnchor = "middle" fill = "#fff" fontSize = "16"
                                    fontWeight = "bold" > { d.freq } < /text> <
                                    polygon points = { `${x + barWidth/2 - 6},${y - 15} ${x + barWidth/2 + 6},${y - 15} ${x + barWidth/2},${y - 8}` }
                                    fill = "#0f172a" / >
                                    <
                                    /g> <
                                    text x = { x + barWidth / 2 } y = { svgHeight - 25 } textAnchor = "middle" fill = "#64748b"
                                    fontSize = "16" fontWeight = "700" > { d.label } < /text> <
                                    /g>
                                );
